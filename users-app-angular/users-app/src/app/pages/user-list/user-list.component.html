<div class="page-header">
  <div>
    <h1 class="page-title">Пользователи</h1>
  </div>

  <a nz-button nzType="primary" routerLink="/users/new">Добавить пользователя</a>
</div>

<nz-card class="toolbar-card">
  <div class="toolbar">
    <input
      nz-input
      class="search-input"
      placeholder="Поиск по имени или email"
      [(ngModel)]="searchValue"
      (ngModelChange)="applyFilter()"
    />

    <button nz-button type="button" [disabled]="!searchValue" (click)="resetFilter()">
      Сбросить
    </button>

    <span class="search-count">
      Найдено: {{ filteredUsers.length }} из {{ users.length }}
    </span>
  </div>
</nz-card>

<nz-card>
  <nz-table
    #usersTable
    [nzData]="filteredUsers"
    [nzLoading]="loading"
    [nzPageSize]="5"
    [nzShowPagination]="true"
    [nzFrontPagination]="true"
  >
    <thead>
      <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Email</th>
        <th>Телефон</th>
        <th>Сайт</th>
        <th class="actions-title">Действия</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of usersTable.data">
        <td>{{ user.id }}</td>
        <td>
          <strong>{{ user.name }}</strong>
          <div class="username">{{ user.username }}</div>
        </td>
        <td>{{ user.email }}</td>
        <td>{{ user.phone || '—' }}</td>
        <td>
          <nz-tag *ngIf="user.website">{{ user.website }}</nz-tag>
        </td>
        <td class="actions">
          <a nz-button nzSize="small" nzType="link" [routerLink]="['/users', user.id]">Детали</a>
          <a nz-button nzSize="small" nzType="link" [routerLink]="['/users', user.id, 'edit']">Изменить</a>
          <button
            nz-button
            nzSize="small"
            nzType="link"
            nzDanger
            nz-popconfirm
            nzPopconfirmTitle="Удалить пользователя?"
            (nzOnConfirm)="deleteUser(user.id)"
          >
            Удалить
          </button>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-card>
